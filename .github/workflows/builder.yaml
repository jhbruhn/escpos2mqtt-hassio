name: Builder

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: escpos2mqtt-hassio
  MONITORED_FILES: "build.yaml config.json Dockerfile rootfs"

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        description: Source tag to build this addon against.

permissions:
  contents: read

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5.0.0

      - name: Get changed files
        id: changed_files
        uses: jitterbit/get-changed-files@v1
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push')

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Get changed add-ons
        id: changed_addons
        run: |
          declare -a changed_addons
          for addon in ${{ steps.addons.outputs.addons }}; do
            if [[ ${{ github.event_name }} == 'workflow_dispatch' || "${{ steps.changed_files.outputs.all }}" =~ $addon ]]; then
              for file in ${{ env.MONITORED_FILES }}; do
                  if [[ ${{ github.event_name }} == 'workflow_dispatch' || "${{ steps.changed_files.outputs.all }}" =~ $addon/$file ]]; then
                    if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                      changed_addons+=("\"${addon}\",");
                    fi
                  fi
              done
            fi
          done

          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "changed=true" >> $GITHUB_OUTPUT;
            echo "addons=[$changed]" >> $GITHUB_OUTPUT;
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
          fi

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    needs: init
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5.0.0

      - name: Set version and update build config
        run: |
          jq '.version = $version' --arg version edge-${{ inputs.tag }} escpos2mqtt/config.json > escpos2mqtt/config.json.tmp
          mv escpos2mqtt/config.json.tmp escpos2mqtt/config.json
          echo "  FROM_VERSION: '${{ inputs.tag }}'" >> escpos2mqtt/build.yaml
          cat escpos2mqtt/build.yaml

      - name: Read build.yaml configuration
        id: build_config
        run: |
          BUILD_FROM=$(yq '.build_from["${{ matrix.arch }}"]' escpos2mqtt/build.yaml)
          echo "build_from=${BUILD_FROM}" >> $GITHUB_OUTPUT

          TEMPIO_VERSION=$(yq '.args.TEMPIO_VERSION' escpos2mqtt/build.yaml)
          echo "tempio_version=${TEMPIO_VERSION}" >> $GITHUB_OUTPUT

          FROM_VERSION=$(yq '.args.FROM_VERSION' escpos2mqtt/build.yaml)
          echo "from_version=${FROM_VERSION}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            edge-${{ inputs.tag }}
            latest
          push: "true"
          version: edge-${{ inputs.tag }}
          context: ./escpos2mqtt
          build-args: |
            BUILD_FROM=${{ steps.build_config.outputs.build_from }}
            TEMPIO_VERSION=${{ steps.build_config.outputs.tempio_version }}
            FROM_VERSION=${{ steps.build_config.outputs.from_version }}
          labels: |
            org.opencontainers.image.title=escpos2mqtt HomeAssistant Add-on
            org.opencontainers.image.description=Add-on to use ESC/POS thermal printers via MQTT.
            org.opencontainers.image.source=https://github.com/jhbruhn/escpos2mqtt-hassio
            org.opencontainers.image.licenses=MIT
          cosign: "false"

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    if: needs.init.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            edge-${{ inputs.tag }}
            latest
          cosign: "false"

  version:
    needs: [init, build, manifest]
    if: needs.init.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5.0.0
      - name: Set version and update release
        run: |
          jq '.version = $version' --arg version edge-${{ inputs.tag }} escpos2mqtt/config.json > escpos2mqtt/config.json.tmp
          mv escpos2mqtt/config.json.tmp escpos2mqtt/config.json

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "edge update"
